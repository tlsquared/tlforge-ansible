APP_NAME = TL Forge
APP_SLOGAN =
RUN_USER = git
WORK_PATH = /var/lib/forgejo
RUN_MODE = prod

[database]
DB_TYPE = sqlite3
HOST = 127.0.0.1:3306
NAME = forgejo
USER = forgejo
PASSWD =
SCHEMA =
SSL_MODE = disable
PATH = /var/lib/forgejo/data/forgejo.db
LOG_SQL = false

[repository]
ROOT = /var/lib/forgejo/data/forgejo-repositories

[server]
SSH_DOMAIN = tlforge.dev
DOMAIN = tlforge.dev
HTTP_PORT = 3000
ROOT_URL = https://tlforge.dev/
APP_DATA_PATH = /var/lib/forgejo/data
DISABLE_SSH = true
LFS_START_SERVER = true
LFS_JWT_SECRET = {{ forgejo_lfs_jwt_secret }}
OFFLINE_MODE = true

[lfs]
PATH = /var/lib/forgejo/data/lfs

[mailer]
ENABLED = true
PROTOCOL = smtp+starttls
SMTP_ADDR = {{ smtp_host }}
SMTP_PORT = {{ smtp_port }}
USER = {{ smtp_user }}
PASSWD = {{ smtp_password }}
FROM = TL Forge <noreply@tlforge.dev>

[service]
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = true
DISABLE_REGISTRATION = true
ALLOW_ONLY_EXTERNAL_REGISTRATION = false
ENABLE_CAPTCHA = false
REQUIRE_SIGNIN_VIEW = false
DEFAULT_KEEP_EMAIL_PRIVATE = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = true
NO_REPLY_ADDRESS = noreply.tlforge.dev

[openid]
ENABLE_OPENID_SIGNIN = true
ENABLE_OPENID_SIGNUP = true

[cron.update_checker]
ENABLED = true

[session]
PROVIDER = file

[log]
MODE = console
LEVEL = info
ROOT_PATH = /var/lib/forgejo/log

[repository.pull-request]
DEFAULT_MERGE_STYLE = merge

[repository.signing]
DEFAULT_TRUST_MODEL = committer

[security]
INSTALL_LOCK = true
SECRET_KEY = {{ forgejo_secret_key }}
INTERNAL_TOKEN = {{ forgejo_internal_token }}
PASSWORD_HASH_ALGO = pbkdf2_hi

[oauth2]
JWT_SECRET = {{ forgejo_jwt_secret }}
