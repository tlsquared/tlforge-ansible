---
- name: Install Git and Git LFS
  ansible.builtin.apt:
    pkg: [git, git-lfs]

- name: Create group
  ansible.builtin.group:
    name: git

- name: Create user
  ansible.builtin.user:
    name: git
    home: /home/git
    shell: /bin/bash
    comment: Git Version Control
    group: git
    password: "*"

- name: Create working directory on mounted data volume
  ansible.builtin.file:
    state: directory
    path: /mnt/data-volume/forgejo
    owner: git
    group: git
    mode: "0750"

- name: Link working directory to mounted data volume
  ansible.builtin.file:
    state: link
    src: /mnt/data-volume/forgejo
    dest: /var/lib/forgejo
    owner: git
    group: git
    mode: "0750"

- name: Create configuration directory
  ansible.builtin.file:
    state: directory
    path: /etc/forgejo
    owner: git
    group: git
    mode: "0770"

- name: Write configuration
  ansible.builtin.template:
    src: app.ini
    dest: /etc/forgejo/app.ini
    owner: git
    group: git
    mode: "0644"
  register: forgejo_config

- name: Write signing key
  ansible.builtin.template:
    src: key.asc
    dest: /tmp/key.asc
    owner: git
    group: git
    mode: "0644"

- name: Import signing key
  ansible.builtin.command:
    cmd: gpg --homedir /var/lib/forgejo/data/home/.gnupg --batch --import /tmp/key.asc
  become: true
  become_user: git

# TODO: Verify GPG signature.
- name: Download binary
  ansible.builtin.get_url:
    url: https://codeberg.org/forgejo/forgejo/releases/download/v{{ forgejo_version }}/forgejo-{{ forgejo_version }}-linux-amd64
    dest: /usr/local/bin/forgejo
    mode: "0775"
    owner: root
    group: root

- name: Add service
  ansible.builtin.copy:
    src: forgejo.service
    dest: /etc/systemd/system/forgejo.service
    owner: root
    group: root
    mode: "0775"

- name: Enable and start service
  ansible.builtin.systemd_service:
    name: forgejo
    state: started
    enabled: true

- name: Restart service
  ansible.builtin.service:
    name: forgejo
    state: restarted
  when: forgejo_config.changed

- name: Write Caddy configuration
  ansible.builtin.template:
    src: forgejo.caddy
    dest: /etc/caddy/conf.d/forgejo
    owner: root
    group: root
    mode: "0775"
  register: caddy_config

- name: Reload Caddy
  ansible.builtin.service:
    name: caddy
    state: reloaded
  when: caddy_config.changed
