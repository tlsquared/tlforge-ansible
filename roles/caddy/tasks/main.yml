---
- name: Install dependencies
  ansible.builtin.apt:
    pkg: [debian-keyring, debian-archive-keyring, apt-transport-https, curl]

- name: Copy PGP public key block
  ansible.builtin.copy:
    src: gpg.key
    dest: /tmp/gpg.key
    owner: root
    group: root
    mode: "0644"

- name: Write PGP/GPG key public ring
  ansible.builtin.command:
    gpg --dearmor --yes -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /tmp/gpg.key

- name: Download sources list
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
    dest: /etc/apt/sources.list.d/caddy-stable.list
    owner: root
    group: root
    mode: "0644"

- name: Install Caddy
  ansible.builtin.apt:
    pkg: caddy
    update_cache: true

- name: Create configuration directory
  ansible.builtin.file:
    state: directory
    path: /etc/caddy/conf.d
    owner: root
    group: root
    mode: "0755"

- name: Write Caddyfile
  ansible.builtin.copy:
    src: Caddyfile
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"

- name: Enable and start service
  ansible.builtin.systemd_service:
    name: caddy
    state: started
    enabled: true
